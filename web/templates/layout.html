<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottesmo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1><a href="/">Bottesmo</a></h1>
        <button id="theme-toggle" aria-label="Changer de thème">☀️</button>
    </header>
    <main>
        {{if eq .Page "home"}}
        <div id="home">
            <h2>Choisissez un mode de jeu</h2>
            <button class="mode-btn" data-mode="daily">Mot du jour</button>
            <button class="mode-btn" data-mode="solo">Solo</button>
            <button class="mode-btn" onclick="window.location.href='/multiplayer'">Multijoueur</button>
        </div>
        {{else if eq .Page "game"}}
        {{template "game.html" .}}
        {{else if eq .Page "multiplayer"}}
        {{template "multiplayer.html" .}}
        {{end}}
    </main>
    <script src="/static/app.js"></script>
    {{if eq .Page "multiplayer"}}
    <script src="/static/multiplayer.js"></script>
    {{end}}
</body>
</html>
